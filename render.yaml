services:
  # ── Django Backend ──────────────────────────────────────────────────
  - type: web
    name: backend-mertkarabulut
    runtime: python
    region: frankfurt
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: gunicorn core.wsgi --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mertkarabulut-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "backend-mertkarabulut.onrender.com,localhost"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://mertkarabulut-blog.onrender.com"
      - key: PYTHON_VERSION
        value: "3.11.0"

  # ── Angular Frontend ────────────────────────────────────────────────
  - type: web
    name: mertkarabulut-blog
    runtime: static
    rootDir: frontend
    buildCommand: npm ci --legacy-peer-deps && npx ng build --configuration production
    staticPublishPath: dist/frontend/browser
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  # ── PostgreSQL ──────────────────────────────────────────────────────
  - name: mertkarabulut-db
    region: frankfurt
    databaseName: blogdb
    user: bloguser
